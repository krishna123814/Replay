<!DOCTYPE html>
<!--
  REPLAY APP — BankNifty + BTCUSDT Historical Stack View
  Data: .pkl.gz files from GitHub (krishna123814/Replay repo)
  No live data. Pure offline historical chart stack.
  Mobile-first. Scrollable. Indicators: Swing S/R + Candle H/L lines.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Replay — BN + BTC Stack</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#131722;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#d1d4dc}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#363c4e;border-radius:2px}

/* ── App Shell ── */
#app{display:flex;flex-direction:column;width:100vw;height:100dvh;overflow:hidden}

/* ── Header ── */
#hdr{
  height:22px;min-height:22px;
  background:#1e222d;border-bottom:1px solid #2a2e39;
  display:flex;align-items:center;padding:0 4px;gap:4px;flex-shrink:0;
  overflow-x:auto;overflow-y:hidden;-ms-overflow-style:none;scrollbar-width:none;
  position:relative;z-index:8100;
}
#hdr::-webkit-scrollbar{display:none}

/* Symbol button */
#sym-btn{
  height:18px;padding:0 6px;background:#2a2e39;border:1px solid #363c4e;
  border-radius:3px;color:#f0b429;font-size:10px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap;
  position:relative;
}
#sym-btn:active{background:#363c4e}

/* Symbol dropdown */
#sym-drop{
  display:none;position:fixed;top:24px;left:4px;
  background:#1e222d;border:1px solid #363c4e;border-radius:6px;
  z-index:9999;box-shadow:0 8px 24px #0009;min-width:140px;overflow:hidden;
}
#sym-drop.open{display:block}
.sym-dd-item{
  padding:9px 12px;font-size:12px;font-weight:700;cursor:pointer;
  border-bottom:1px solid #2a2e3944;display:flex;align-items:center;gap:6px;
}
.sym-dd-item:last-child{border-bottom:none}
.sym-dd-item:active{background:#2a2e39}
.sym-dd-item.active{color:#2962ff}

/* Status badge */
#status-badge{
  height:18px;padding:0 6px;
  border:1px solid #f0b42955;border-radius:3px;
  color:#f0b429;font-size:9px;font-weight:700;
  display:flex;align-items:center;white-space:nowrap;flex-shrink:0;
}

/* Header right side */
#hdr-right{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:auto}
.hdr-icon-btn{
  width:22px;height:18px;background:transparent;border:1px solid #2a2e39;
  border-radius:3px;color:#9598a1;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.hdr-icon-btn:active{background:#2a2e39;color:#d1d4dc}
.hdr-icon-btn.active{background:#2962ff;border-color:#2962ff;color:#fff}

/* ── TF Bar ── */
#tf-bar{
  height:14px;min-height:14px;background:#1e222d;
  border-bottom:1px solid #2a2e39;
  display:flex;align-items:center;padding:0 4px;gap:2px;flex-shrink:0;
  overflow-x:auto;overflow-y:hidden;-ms-overflow-style:none;scrollbar-width:none;
}
#tf-bar::-webkit-scrollbar{display:none}
.tf-btn{
  height:12px;padding:0 5px;
  background:transparent;border:none;border-radius:2px;
  color:#787b86;font-size:10px;font-weight:600;cursor:pointer;
  line-height:12px;white-space:nowrap;flex-shrink:0;
}
.tf-btn:active{background:#2a2e39}
.tf-btn.active{color:#2962ff;background:#2a2e391a}
.tf-btn:disabled{color:#363c4e;opacity:0.3;cursor:not-allowed}
.tf-sep{width:1px;height:9px;background:#2a2e39;margin:0 2px;flex-shrink:0}

/* ── Stack Container ── */
#stack-wrap{
  flex:1;min-height:0;
  overflow-y:scroll;overflow-x:hidden;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;
  background:#2a2e39;
  gap:1px;
}

/* ── Stack Cell ── */
.stack-cell{
  flex:0 0 auto;width:100%;
  position:relative;
  background:#131722;
  display:flex;flex-direction:column;
  border-bottom:1px solid #2a2e39;
}
/* chart div fills cell */
.cell-chart{
  flex:1;min-height:0;
  touch-action:manipulation;
  overflow:hidden;position:relative;
  will-change:transform;transform:translateZ(0);
}
/* overlay top-left label */
.cell-overlay{
  position:absolute;top:3px;left:4px;right:60px;z-index:10;
  pointer-events:none;line-height:1.5;
  display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;gap:3px;
}
.co-sym{font-size:9px;font-weight:700;color:#d1d4dc}
.co-tf{font-size:9px;color:#787b86}
.co-price{font-size:9px;font-weight:600}
.up{color:#26a69a}.dn{color:#ef5350}

/* screen N:total badge — top right */
.cell-screen-badge{
  position:absolute;top:3px;right:4px;z-index:10;
  font-size:8px;color:#363c4e;pointer-events:none;
}

/* ── Bottom Bar ── */
#bottom-bar{
  height:22px;min-height:22px;
  background:#1e222d;border-top:1px solid #2a2e39;
  display:flex;align-items:center;padding:0 6px;gap:4px;
  overflow-x:auto;flex-shrink:0;-ms-overflow-style:none;scrollbar-width:none;
  position:relative;z-index:8100;
}
#bottom-bar::-webkit-scrollbar{display:none}
.bot-sep{width:1px;height:14px;background:#2a2e39;margin:0 2px;flex-shrink:0}

.bb-btn{
  height:18px;padding:0 8px;
  background:transparent;border:1px solid #2a2e39;border-radius:3px;
  color:#9598a1;font-size:10px;line-height:18px;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.bb-btn:active{background:#2a2e39}
.bb-btn.active{border-color:#2962ff;color:#2962ff}

/* ▲▼ jump buttons */
#jump-up,#jump-dn{
  height:18px;width:22px;background:#2a2e39;border:1px solid #363c4e;
  border-radius:3px;color:#9598a1;font-size:10px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#jump-up:active,#jump-dn:active{background:#363c4e;color:#fff}

/* ── Indicators Panel ── */
#ind-panel{
  display:none;position:fixed;inset:0;z-index:8888;
  background:#0009;backdrop-filter:blur(4px);
  align-items:flex-end;justify-content:center;
}
#ind-panel.open{display:flex}
#ind-box{
  background:#1e222d;border:1px solid #2a2e39;border-radius:12px 12px 0 0;
  width:100%;max-width:480px;max-height:70vh;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -8px 32px #0009;
}
#ind-hdr{
  display:flex;align-items:center;padding:14px 16px;
  border-bottom:1px solid #2a2e39;font-weight:700;font-size:14px;
}
#ind-close{
  margin-left:auto;width:28px;height:28px;border-radius:50%;
  background:#2a2e39;border:none;color:#d1d4dc;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#ind-body{flex:1;overflow-y:auto;padding:8px 16px 20px}
.ind-group-title{
  font-size:10px;color:#555;text-transform:uppercase;
  letter-spacing:1px;font-weight:700;padding:10px 0 6px;
  border-bottom:1px solid #2a2e39;margin-bottom:8px;
}
.ind-row{
  display:flex;align-items:center;padding:10px 0;
  border-bottom:1px solid #2a2e391a;
}
.ind-row:last-child{border-bottom:none}
.ind-name{flex:1;font-size:13px;color:#d1d4dc}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .sl{
  position:absolute;inset:0;background:#2a2e39;border-radius:22px;cursor:pointer;transition:.25s;
}
.toggle .sl:before{
  content:'';position:absolute;width:16px;height:16px;
  left:3px;bottom:3px;background:#787b86;border-radius:50%;transition:.25s;
}
.toggle input:checked+.sl{background:#2962ff}
.toggle input:checked+.sl:before{transform:translateX(18px);background:#fff}

/* ── Loading overlay ── */
#loading{
  display:none;position:fixed;inset:0;z-index:99999;
  background:#131722cc;backdrop-filter:blur(4px);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#loading.show{display:flex}
#loading-spinner{
  width:32px;height:32px;border:3px solid #2a2e39;
  border-top-color:#2962ff;border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{font-size:13px;color:#9598a1;text-align:center;max-width:260px;line-height:1.5}
#loading-bar-wrap{width:240px;height:4px;background:#2a2e39;border-radius:2px;overflow:hidden}
#loading-bar{height:100%;width:0%;background:#2962ff;border-radius:2px;transition:width .3s}

/* ── Error toast ── */
#toast{
  display:none;position:fixed;left:50%;top:14px;transform:translateX(-50%);
  background:#ef5350;color:#fff;padding:8px 16px;border-radius:8px;
  font:600 12px sans-serif;z-index:999999;box-shadow:0 4px 16px #0008;
  max-width:90vw;text-align:center;
}
#toast.show{display:block}

/* ── Hide LWC attribution ── */
.tv-lightweight-charts a{display:none!important}
.tv-lightweight-charts table tr:last-child td{height:20px!important;max-height:20px!important}
.tv-lightweight-charts table tr:last-child canvas{height:20px!important}

/* Mobile: slightly bigger tap targets */
@media(pointer:coarse){
  .tf-btn{height:22px;font-size:11px;padding:0 7px;line-height:22px}
  #tf-bar{height:18px;min-height:18px}
  #hdr{height:26px;min-height:26px}
  #bottom-bar{height:26px;min-height:26px}
}
</style>
</head>
<body>
<div id="app">

  <!-- ═══ HEADER ═══ -->
  <div id="hdr">

    <!-- Symbol button -->
    <div style="position:relative;flex-shrink:0">
      <button id="sym-btn" onclick="toggleSymDrop()">
        <span id="sym-label">📊 BANKNIFTY</span> ▾
      </button>
      <div id="sym-drop">
        <div class="sym-dd-item active" id="dd-bn"  onclick="switchAsset('bn')">📊 BANKNIFTY</div>
        <div class="sym-dd-item"        id="dd-btc" onclick="switchAsset('btc')">₿ BTCUSDT</div>
      </div>
    </div>

    <!-- Status badge -->
    <span id="status-badge">⏵ Replay</span>

    <!-- Spacer -->
    <div style="flex:1;min-width:0"></div>

    <!-- Right icons -->
    <div id="hdr-right">
      <button class="hdr-icon-btn" onclick="toggleIndPanel()" title="Indicators">📊</button>
      <button class="hdr-icon-btn" onclick="autoFitAll()" title="Auto-fit all">⊡</button>
    </div>
  </div>

  <!-- ═══ TF BAR ═══ -->
  <div id="tf-bar">
    <!-- BN TFs: 5m 15m 45m 135m | 1d 3d 9d 27d -->
    <button class="tf-btn" data-tf="5m"   onclick="jumpToTf('5m')">5m</button>
    <button class="tf-btn" data-tf="15m"  onclick="jumpToTf('15m')">15m</button>
    <button class="tf-btn" data-tf="45m"  onclick="jumpToTf('45m')">45m</button>
    <button class="tf-btn" data-tf="135m" onclick="jumpToTf('135m')">135m</button>
    <div class="tf-sep"></div>
    <!-- BTC TFs: 160m 8h | 1d 3d 9d 27d -->
    <button class="tf-btn" data-tf="160m" onclick="jumpToTf('160m')">160m</button>
    <button class="tf-btn" data-tf="8h"   onclick="jumpToTf('8h')">8H</button>
    <div class="tf-sep"></div>
    <button class="tf-btn" data-tf="1d"   onclick="jumpToTf('1d')">1D</button>
    <button class="tf-btn" data-tf="3d"   onclick="jumpToTf('3d')">3D</button>
    <button class="tf-btn" data-tf="9d"   onclick="jumpToTf('9d')">9D</button>
    <button class="tf-btn" data-tf="27d"  onclick="jumpToTf('27d')">27D</button>
  </div>

  <!-- ═══ SCROLLABLE STACK ═══ -->
  <div id="stack-wrap"></div>

  <!-- ═══ BOTTOM BAR ═══ -->
  <div id="bottom-bar">
    <button class="bb-btn" onclick="toggleIndPanel()">📊 Indicators</button>
    <div class="bot-sep"></div>
    <button class="bb-btn" onclick="autoFitAll()">⊡ Auto</button>
    <div style="flex:1"></div>
    <button id="jump-up" onclick="jumpStack(-1)">▲</button>
    <button id="jump-dn" onclick="jumpStack(1)">▼</button>
  </div>

</div>

<!-- ═══ INDICATORS PANEL ═══ -->
<div id="ind-panel" onclick="if(event.target===this)toggleIndPanel()">
  <div id="ind-box">
    <div id="ind-hdr">
      📊 Indicators
      <button id="ind-close" onclick="toggleIndPanel()">✕</button>
    </div>
    <div id="ind-body">
      <div class="ind-group-title">Swing S/R</div>
      <div class="ind-row">
        <span class="ind-name">Swing High/Low Lines</span>
        <label class="toggle">
          <input type="checkbox" id="ind-swing" checked onchange="toggleIndicator('swing')">
          <span class="sl"></span>
        </label>
      </div>
      <div class="ind-row">
        <span class="ind-name">Candle H/L Lines</span>
        <label class="toggle">
          <input type="checkbox" id="ind-candle" checked onchange="toggleIndicator('candle')">
          <span class="sl"></span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- ═══ LOADING ═══ -->
<div id="loading">
  <div id="loading-spinner"></div>
  <div id="loading-msg">Loading data…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── GitHub repo raw base URL ─────────────────────────────────────────────────
// tumhara repo: krishna123814/Replay (branch: main)
const GH_BASE = 'https://raw.githubusercontent.com/krishna123814/Replay/main/';

// ── Asset config ─────────────────────────────────────────────────────────────
const ASSETS = {
  bn: {
    label: '📊 BANKNIFTY',
    file:  'banknifty_all_tf_pkl.gz',
    tfs:   ['5m','15m','45m','135m','1d','3d','9d','27d'],
    // TF → minutes mapping for indicator + resampling logic
    tfMins:{ '5m':5,'15m':15,'45m':45,'135m':135,'1d':1440,'3d':4320,'9d':12960,'27d':38880 },
  },
  btc: {
    label: '₿ BTCUSDT',
    file:  'btc_all_tf_pkl.gz',
    tfs:   ['160m','8h','1d','3d','9d','27d'],
    tfMins:{ '160m':160,'8h':480,'1d':1440,'3d':4320,'9d':12960,'27d':38880 },
  },
};

// ── App state ─────────────────────────────────────────────────────────────────
let _asset = 'bn';   // current asset
let _cells = [];     // array of { chart, series, canvas, ctx, tf, tfMin, el }
let _swingVisible  = true;
let _candleVisible = true;
const _dataCache   = {};  // dataCache['bn']['5m'] = [{time,open,high,low,close}...]
const _loadedFiles = {};  // loadedFiles['bn'] = true

// ── Utility ───────────────────────────────────────────────────────────────────
function _toast(msg, color, dur) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color || '#ef5350';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur || 3000);
}

function _setStatus(msg) {
  const el = document.getElementById('status-badge');
  if (el) el.textContent = msg ? '⏵ ' + msg : '⏵ Replay';
}

function _setLoadingMsg(msg, pct) {
  const m = document.getElementById('loading-msg');
  const b = document.getElementById('loading-bar');
  if (m) m.textContent = msg;
  if (b && pct !== undefined) b.style.width = pct + '%';
}

function _showLoading(show) {
  const el = document.getElementById('loading');
  el.classList.toggle('show', show);
  if (show) document.getElementById('loading-bar').style.width = '0%';
}

// ── Symbol dropdown toggle ────────────────────────────────────────────────────
function toggleSymDrop() {
  const d = document.getElementById('sym-drop');
  d.classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const drop = document.getElementById('sym-drop');
  const btn  = document.getElementById('sym-btn');
  if (drop.classList.contains('open') && !btn.contains(e.target))
    drop.classList.remove('open');
}, true);

// ── Switch asset ──────────────────────────────────────────────────────────────
async function switchAsset(asset) {
  if (!ASSETS[asset]) return;
  document.getElementById('sym-drop').classList.remove('open');
  if (_asset === asset && _loadedFiles[asset]) return;
  _asset = asset;

  // Update header label
  document.getElementById('sym-label').textContent = ASSETS[asset].label;

  // Update dropdown active state
  document.querySelectorAll('.sym-dd-item').forEach(el => el.classList.remove('active'));
  document.getElementById('dd-' + asset)?.classList.add('active');

  // Update TF bar — enable/disable buttons per asset
  _updateTfBar(asset);

  // Load and render
  await _loadAndRender(asset);
}

function _updateTfBar(asset) {
  const cfg  = ASSETS[asset];
  const allTfs = document.querySelectorAll('#tf-bar .tf-btn');
  allTfs.forEach(btn => {
    const tf = btn.dataset.tf;
    const has = (cfg.tfMins[tf] !== undefined);
    btn.disabled = !has;
    btn.style.opacity = has ? '1' : '0.2';
    btn.classList.remove('active');
  });
}

// ── Jump to TF cell in stack ──────────────────────────────────────────────────
function jumpToTf(tf) {
  // Find the cell with matching tf
  const idx = _cells.findIndex(c => c.tf === tf);
  if (idx < 0) return;

  // Highlight button
  document.querySelectorAll('#tf-bar .tf-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`#tf-bar .tf-btn[data-tf="${tf}"]`);
  if (btn) btn.classList.add('active');

  // Scroll to cell
  const wrap = document.getElementById('stack-wrap');
  const cellEl = document.getElementById('scell-' + idx);
  if (wrap && cellEl) {
    wrap.scrollTo({ top: cellEl.offsetTop, behavior: 'smooth' });
  }
}

// ── Stack jump buttons ▲▼ ────────────────────────────────────────────────────
function jumpStack(dir) {
  const wrap = document.getElementById('stack-wrap');
  if (!wrap || !_cells.length) return;
  const cellH = wrap.clientHeight / 4 || 200;
  wrap.scrollTo({ top: Math.max(0, wrap.scrollTop + dir * cellH), behavior: 'smooth' });
}

// ── Auto fit all charts ───────────────────────────────────────────────────────
function autoFitAll() {
  _cells.forEach(c => {
    try { c.chart.timeScale().fitContent(); } catch(_) {}
  });
}

// ── Indicators toggle ─────────────────────────────────────────────────────────
function toggleIndPanel() {
  document.getElementById('ind-panel').classList.toggle('open');
}

function toggleIndicator(type) {
  if (type === 'swing')  _swingVisible  = document.getElementById('ind-swing').checked;
  if (type === 'candle') _candleVisible = document.getElementById('ind-candle').checked;
  _cells.forEach(c => _drawIndicator(c));
}

// ── Load .pkl.gz from GitHub via Python local server ─────────────────────────
// Since we can't run Python in browser, we use the local Streamlit API port
// to serve the .gz data. For standalone HTML (no Streamlit), we try to fetch
// the .gz directly and parse it.
// 
// Strategy: Use the same /api/replay_gz endpoint from the Python server.
// If no server, show a helpful error.

const CHUNK_SIZE = 5000;
let _apiPort = 8502;

// Probe port 8502..8510
async function _probePort() {
  const host = window.location.hostname || 'localhost';
  for (let p = 8502; p <= 8510; p++) {
    try {
      const r = await fetch(`http://${host}:${p}/api/replay_gz?asset=bn&tf=1d&chunk=0`,
        { cache: 'no-store', signal: AbortSignal.timeout(3000) });
      if (r.ok || r.status === 404) { _apiPort = p; return true; }
    } catch(_) {}
  }
  return false;
}

async function _fetchChunk(asset, tf, chunk) {
  const host = window.location.hostname || 'localhost';
  const url = `http://${host}:${_apiPort}/api/replay_gz?asset=${asset}&tf=${encodeURIComponent(tf)}&chunk=${chunk}`;
  const r = await fetch(url, { cache: 'no-store', signal: AbortSignal.timeout(90000) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function _fetchAllChunks(asset, tf, totalTfs, tfIdx) {
  let all = [], chunk = 0;
  while (true) {
    const res = await _fetchChunk(asset, tf, chunk);
    all = all.concat(res.candles || []);
    // Update progress
    const pct = ((tfIdx / totalTfs) + (all.length / (res.total_rows || 1)) / totalTfs) * 100;
    _setLoadingMsg(`Loading ${tf} (${all.length}/${res.total_rows || '?'})`, Math.min(pct, 98));
    if (!res.has_more) break;
    chunk++;
    await new Promise(r => setTimeout(r, 20));
  }
  return all;
}

// ── Build stack cells DOM ─────────────────────────────────────────────────────
function _buildStackDOM(asset) {
  const wrap = document.getElementById('stack-wrap');
  wrap.innerHTML = '';
  _destroyCells();

  const cfg  = ASSETS[asset];
  const tfs  = cfg.tfs;
  const total = tfs.length;
  const cellH = `calc(100% / 4)`; // 4 cells visible at once

  tfs.forEach((tf, i) => {
    const cell = document.createElement('div');
    cell.className = 'stack-cell';
    cell.id = 'scell-' + i;
    cell.style.height = cellH;

    // Overlay label
    const overlay = document.createElement('div');
    overlay.className = 'cell-overlay';
    overlay.innerHTML =
      `<span class="co-sym">${asset==='bn'?'📊 BN':'₿ BTC'}</span>` +
      `<span class="co-tf"> · ${tf}</span>` +
      `<span class="co-price up" id="co-price-${i}">--</span>`;

    // Chart div
    const chartDiv = document.createElement('div');
    chartDiv.className = 'cell-chart';
    chartDiv.id = 'cchart-' + i;
    chartDiv.style.position = 'relative';

    // Screen badge
    const badge = document.createElement('span');
    badge.className = 'cell-screen-badge';
    badge.textContent = `${i+1}:${total}`;

    cell.appendChild(overlay);
    cell.appendChild(chartDiv);
    cell.appendChild(badge);
    wrap.appendChild(cell);

    _cells.push({ tf, tfMin: cfg.tfMins[tf] || 1440, el: chartDiv, idx: i,
                  chart: null, series: null, canvas: null, ctx: null });
  });
}

// ── Destroy existing cells ────────────────────────────────────────────────────
function _destroyCells() {
  _cells.forEach(c => {
    try { c.chart?.remove(); } catch(_) {}
    try { c.canvas?.remove(); } catch(_) {}
  });
  _cells = [];
}

// ── Build one LWC chart in a cell ─────────────────────────────────────────────
function _buildCellChart(c, candles) {
  const el = c.el;
  if (!el) return;

  const ch = LightweightCharts.createChart(el, {
    width:  el.clientWidth  || 320,
    height: el.clientHeight || 200,
    layout: {
      background: { type: 'solid', color: '#131722' },
      textColor: '#d1d4dc', fontSize: 7,
    },
    grid: {
      vertLines: { color: 'transparent' },
      horzLines: { color: 'transparent' },
    },
    crosshair: {
      mode: 0,
      vertLine: { labelVisible: true },
      horzLine: { labelVisible: true },
    },
    rightPriceScale: {
      borderColor: '#2a2e39',
      scaleMargins: { top: 0.2, bottom: 0.2 },
      autoScale: true,
    },
    timeScale: {
      borderColor: '#2a2e39',
      timeVisible: true,
      secondsVisible: false,
      rightOffset: 3,
      barSpacing: 4,
      minBarSpacing: 1,
    },
    localization: {
      priceFormatter: (p) => p.toLocaleString('en-US', {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      }),
    },
    handleScroll: {
      mouseWheel: true, pressedMouseMove: true,
      horzTouchDrag: true, vertTouchDrag: true,
    },
    handleScale: {
      axisPressedMouseMove: true, mouseWheel: true, pinch: true,
    },
    kineticScroll: { mouse: true, touch: true },
  });

  const upClr = '#26a69a', dnClr = '#ef5350';
  const ser = ch.addCandlestickSeries({
    upColor: upClr, downColor: dnClr,
    borderUpColor: upClr, borderDownColor: dnClr,
    wickUpColor: upClr, wickDownColor: dnClr,
    priceLineVisible: true, lastValueVisible: true,
  });

  candles.sort((a, b) => a.time - b.time);
  ser.setData(candles);

  // Update price overlay
  if (candles.length) {
    const last = candles[candles.length - 1];
    const pr = document.getElementById('co-price-' + c.idx);
    if (pr) {
      const fmt = last.close.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
      pr.textContent = fmt;
      pr.className = 'co-price ' + (last.close >= last.open ? 'up' : 'dn');
    }
  }

  c.chart  = ch;
  c.series = ser;
  c.candles = candles;

  // Build indicator canvas
  _buildIndicatorCanvas(c);

  // Subscribe to timescale/crosshair changes → redraw indicator
  ch.timeScale().subscribeVisibleLogicalRangeChange(() => _drawIndicator(c));
  let _xhRaf = null;
  ch.subscribeCrosshairMove(() => {
    if (_xhRaf) return;
    _xhRaf = requestAnimationFrame(() => { _xhRaf = null; _drawIndicator(c); });
  });
  try { ser.priceScale().subscribeVisiblePriceRangeChange(() => _drawIndicator(c)); } catch(_) {}

  // ResizeObserver
  const ro = new ResizeObserver(() => {
    if (!ch || !el) return;
    ch.applyOptions({ width: el.clientWidth, height: el.clientHeight });
    _resizeIndicatorCanvas(c);
    _drawIndicator(c);
  });
  ro.observe(el);
  c._ro = ro;
}

// ── Indicator canvas setup ────────────────────────────────────────────────────
function _buildIndicatorCanvas(c) {
  if (c.canvas) { try { c.canvas.remove(); } catch(_) {} }
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:6';
  c.el.appendChild(canvas);
  c.canvas = canvas;
  c.ctx    = canvas.getContext('2d');
  _resizeIndicatorCanvas(c);
}

function _resizeIndicatorCanvas(c) {
  if (!c.canvas || !c.el) return;
  const dpr = window.devicePixelRatio || 1;
  const w = c.el.clientWidth, h = c.el.clientHeight;
  c.canvas.width  = w * dpr;
  c.canvas.height = h * dpr;
  c.canvas.style.width  = w + 'px';
  c.canvas.style.height = h + 'px';
}

// ── Swing S/R + Candle H/L indicator ─────────────────────────────────────────
// Exact copy from chart.html _swingComputeWithColors logic

function _srColorForTf(tfMin) {
  // Color gradient: shorter TF = dimmer, longer = more vivid
  const map = {
    5:    '#5b9cf6', 15:   '#7b61ff', 45:   '#f0b429',
    135:  '#ef5350', 160:  '#26a69a', 480:  '#f0b429',
    1440: '#2962ff', 4320: '#ef5350', 12960:'#f7525f', 38880:'#ff6d00',
  };
  return map[tfMin] || '#9598a1';
}

function _candleColorForTf(tfMin) {
  const map = {
    5:    '#26a69a44', 15:   '#7b61ff44', 45:   '#f0b42944',
    135:  '#ef535044', 160:  '#26a69a44', 480:  '#f0b42944',
    1440: '#2962ff44', 4320: '#ef535044', 12960:'#f7525f44', 38880:'#ff6d0044',
  };
  return map[tfMin] || '#9598a155';
}

function _computeSwingLines(candles, tfMin) {
  if (!candles || candles.length < 2) return [];
  const periodSec = tfMin * 60;
  const WIN = 300;
  const raw = candles.length > WIN ? candles.slice(-WIN) : candles.slice();

  // Is last bar still forming?
  let _forming = false;
  if (raw.length >= 2) {
    const last = raw[raw.length - 1];
    const prev = raw[raw.length - 2];
    const nDays = tfMin > 1440 ? Math.round(tfMin / 1440) : 0;
    if (nDays >= 2) {
      const bd = last.time - prev.time;
      _forming = Math.floor(Date.now() / 1000) < (last.time + bd);
    }
    // For intraday we don't need live check (no live data)
  }
  const data = (raw.length > 1 && _forming) ? raw.slice(0, -1) : raw;

  let aRes = [], aSup = [], chLines = [], clLines = [];
  let pGreen = false, pRed = false, pHigh = 0, pLow = 0;

  for (let i = 0; i < data.length; i++) {
    const cur = data[i];
    const curGreen = cur.close > cur.open;
    const curRed   = cur.close < cur.open;

    const validateLines = (arr) => {
      for (let j = arr.length - 1; j >= 0; j--) {
        const ln = arr[j];
        if (ln.creationIndex >= i) continue;
        if (cur.low <= ln.price && cur.high >= ln.price)
          ln.endTime = cur.time + 2 * periodSec;
        else arr.splice(j, 1);
      }
    };
    validateLines(chLines);
    validateLines(clLines);

    if (i >= 1 && pGreen && curRed) {
      const rPrice = Math.max(pHigh, cur.high);
      const rTime  = pHigh >= cur.high ? data[i-1].time : cur.time;
      aRes = aRes.filter(l => l.price <= rPrice);
      aSup = aSup.filter(l => l.price <= rPrice);
      aRes.push({ price: rPrice, startTime: rTime, kind: 'sh' });
    }
    if (i >= 1 && pRed && curGreen) {
      const sPrice = Math.min(pLow, cur.low);
      const sTime  = pLow <= cur.low ? data[i-1].time : cur.time;
      aSup = aSup.filter(l => l.price >= sPrice);
      aRes = aRes.filter(l => l.price >= sPrice);
      aSup.push({ price: sPrice, startTime: sTime, kind: 'sl' });
    }

    const swingPrices = new Set([...aRes.map(l => l.price), ...aSup.map(l => l.price)]);
    if (!swingPrices.has(cur.high))
      chLines.push({ price: cur.high, startTime: cur.time, endTime: cur.time + 2*periodSec,
                     creationIndex: i, kind: 'ch', periodSec });
    if (!swingPrices.has(cur.low))
      clLines.push({ price: cur.low,  startTime: cur.time, endTime: cur.time + 2*periodSec,
                     creationIndex: i, kind: 'cl', periodSec });

    pGreen = curGreen; pRed = curRed; pHigh = cur.high; pLow = cur.low;
  }

  const out = [];
  const srColor  = _srColorForTf(tfMin);
  const cndColor = _candleColorForTf(tfMin);
  const lastTime = data.length ? data[data.length-1].time : 0;

  // Swing lines (top 5, infinite right)
  const allSwings = [...aRes, ...aSup].sort((a,b) => b.startTime - a.startTime).slice(0,5);
  for (const sw of allSwings)
    out.push({ price: sw.price, startTime: sw.startTime, endTime: null, kind: sw.kind,
               color: srColor, isInfinite: true, levelTf: tfMin });

  // Candle H/L lines (finite)
  const allCandles = [...chLines, ...clLines].filter(l => l.endTime > lastTime);
  for (const l of allCandles)
    out.push({ price: l.price, startTime: l.startTime, endTime: l.endTime, kind: l.kind,
               color: cndColor, isInfinite: false, periodSec: l.periodSec, levelTf: tfMin });

  return out;
}

function _drawIndicator(c) {
  if (!c.ctx || !c.canvas || !c.chart || !c.series || !c.candles) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = c.canvas.width / dpr;
  const cssH = c.canvas.height / dpr;
  c.ctx.setTransform(1,0,0,1,0,0);
  c.ctx.clearRect(0, 0, c.canvas.width, c.canvas.height);
  if (!_swingVisible && !_candleVisible) return;
  c.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const lines = _computeSwingLines(c.candles, c.tfMin);

  for (const ln of lines) {
    if (!_swingVisible  && ln.isInfinite)  continue;
    if (!_candleVisible && !ln.isInfinite) continue;

    const y = c.series.priceToCoordinate(ln.price);
    if (y == null || y < 0 || y > cssH) continue;

    let xS, xE;
    const x0 = c.chart.timeScale().timeToCoordinate(ln.startTime);

    if (ln.isInfinite) {
      xS = (x0 == null || x0 < 0) ? 0 : x0;
      xE = cssW;
    } else {
      xS = x0 == null ? 0 : x0;
      xE = c.chart.timeScale().timeToCoordinate(ln.endTime);
      if (xE == null || xE < 0) {
        // estimate from periodSec
        const xR1 = c.chart.timeScale().timeToCoordinate(ln.startTime);
        const xR2 = c.chart.timeScale().timeToCoordinate(ln.startTime - ln.periodSec);
        if (xR1 != null && xR2 != null) {
          const pxPerSec = Math.abs(xR1 - xR2) / ln.periodSec;
          xE = xS + pxPerSec * (ln.endTime - ln.startTime);
        } else {
          const vr = c.chart.timeScale().getVisibleRange();
          if (vr) xE = xS + (cssW / (vr.to - vr.from)) * (ln.endTime - ln.startTime);
          else xE = xS + 40;
        }
      }
    }

    const _xEclip = Math.min(xE, cssW - 60);
    if (xS == null || _xEclip <= xS) continue;

    c.ctx.save();
    c.ctx.beginPath();
    c.ctx.moveTo(xS, y);
    c.ctx.lineTo(_xEclip, y);
    c.ctx.strokeStyle = ln.color;
    c.ctx.lineWidth   = ln.isInfinite ? 1.2 : 0.8;
    c.ctx.globalAlpha = ln.isInfinite ? 1.0 : 0.8;
    c.ctx.setLineDash(ln.isInfinite ? [] : [3, 3]);
    c.ctx.stroke();
    c.ctx.restore();
  }
}

// ── Main load + render flow ───────────────────────────────────────────────────
async function _loadAndRender(asset) {
  _showLoading(true);
  _setStatus('Connecting…');
  _buildStackDOM(asset);

  try {
    // Probe port if not yet done
    if (!_loadedFiles.__portProbed) {
      _setLoadingMsg('Finding local server…', 2);
      const ok = await _probePort();
      _loadedFiles.__portProbed = true;
      if (!ok) {
        _showLoading(false);
        _setStatus('Error');
        _toast('❌ Local server not found.\nStart the Python app first, then reload.', '#ef5350', 6000);
        return;
      }
    }

    const cfg  = ASSETS[asset];
    const tfs  = cfg.tfs;
    const total = tfs.length;

    // Load each TF
    for (let i = 0; i < total; i++) {
      const tf = tfs[i];
      _setStatus(`Loading ${tf}…`);
      _setLoadingMsg(`Fetching ${tf} data…`, (i / total) * 95);

      let candles;

      // Check cache
      if (_dataCache[asset] && _dataCache[asset][tf]) {
        candles = _dataCache[asset][tf];
      } else {
        candles = await _fetchAllChunks(asset, tf, total, i);
        if (!_dataCache[asset]) _dataCache[asset] = {};
        _dataCache[asset][tf] = candles;
      }

      if (!candles || !candles.length) {
        _toast(`⚠️ ${tf}: 0 candles`, '#f0b429', 2000);
        continue;
      }

      const c = _cells[i];
      if (!c) continue;

      // Wait a tick (prevent UI hang)
      await new Promise(r => setTimeout(r, 10));
      _buildCellChart(c, candles);
    }

    _loadedFiles[asset] = true;
    _setStatus('');
    _setLoadingMsg('Done!', 100);
    setTimeout(() => _showLoading(false), 400);

    // Highlight first TF button
    const firstTf = tfs[0];
    document.querySelectorAll('#tf-bar .tf-btn').forEach(b => b.classList.remove('active'));
    const firstBtn = document.querySelector(`#tf-bar .tf-btn[data-tf="${firstTf}"]`);
    if (firstBtn) firstBtn.classList.add('active');

  } catch (err) {
    _showLoading(false);
    _setStatus('Error');
    _toast('❌ ' + (err.message || err), '#ef5350', 5000);
    console.error('Load error:', err);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  _updateTfBar('bn');
  switchAsset('bn');
});
